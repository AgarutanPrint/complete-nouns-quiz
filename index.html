// ── State ────────────────────────────────────────────────────────
let state = {
  screen: 'menu',
  sectionIdx: 0,
  questions: [],
  qIdx: 0,
  answered: false,
  hintUsed: false,
  points: 0,
  correct: 0,
  wrong: 0
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepareQuestions(section) {
  return shuffle(section.questions).map(q => ({
    ...q,
    options: shuffle(q.options)
  }));
}

// ── Render ───────────────────────────────────────────────────────
const app = document.getElementById('app');

function render() {
  if (state.screen === 'menu') renderMenu();
  else if (state.screen === 'quiz') renderQuiz();
  else if (state.screen === 'end') renderEnd();
}

function renderMenu() {
  app.innerHTML = `
    <div class="brand">Agarutan Print</div>
    <div class="menu-title">The Complete Nouns<br>Grammar Quiz</div>
    <div class="menu-sub">Grades 2–4 • Choose a section to begin!</div>
    ${SECTIONS.map((s, i) => `
      <button class="section-btn ${s.btnClass}" onclick="startSection(${i})">
        ${s.emoji} ${s.title}
      </button>
    `).join('')}
  `;
}

function renderQuiz() {
  const section = SECTIONS[state.sectionIdx];
  const q = state.questions[state.qIdx];
  const total = state.questions.length;
  const pct = (state.qIdx / total) * 100;

  app.innerHTML = `
    <div class="section-header">
      <span class="section-label">${section.short}</span>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
      <span class="q-count">${state.qIdx + 1}/${total}</span>
    </div>
    <div class="question-text">${q.q}</div>
    <div class="hint-text" id="hintBox">💡 ${q.hint}</div>
    <div class="options" id="optionsWrap">
      ${q.options.map(opt => `
        <button class="option-btn" onclick="selectOption(this,'${escHtml(opt)}','${escHtml(q.answer)}')">${opt}</button>
      `).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="action-row">
      <button class="btn-hint" id="hintBtn" onclick="showHint()" ${state.hintUsed ? 'disabled style="opacity:0.4"' : ''}>💡 Hint</button>
      <button class="btn-next" id="nextBtn" onclick="nextQuestion()" disabled>Next →</button>
    </div>
    <button class="btn-exit" onclick="exitToMenu()">✕ Exit to Menu</button>
  `;
}

function escHtml(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function renderEnd() {
  const section = SECTIONS[state.sectionIdx];
  const total = state.questions.length;
  const pct = Math.round((state.correct / total) * 100);
  const passed = pct >= 70;
  const isMastery = !!section.isMastery;

  let titleText = '', subtitleText = '';
  if (passed) {
    if (pct === 100) titleText = '🏆 Spectacular!';
    else if (pct >= 85) titleText = '⭐ Excellent!';
    else titleText = '🌟 Great Job!';
    subtitleText = `You scored ${pct}% on ${section.short}!`;
  } else {
    subtitleText = `You scored ${pct}% — keep practising!`;
  }

  const showReview = isMastery && passed && SRC !== null;

  let reviewHtml = '';
  if (showReview) {
    let btnHtml = '';
    if (SRC === 'etsy') {
      btnHtml = `<a href="${ETSY_URL}" target="_blank" class="review-btn">⭐ Leave a Review on Etsy</a>`;
    } else if (SRC === 'amazon') {
      btnHtml = `
        <a href="${AMAZON_PB_URL}" target="_blank" class="review-btn">📗 Review Paperback on Amazon</a>
        <a href="${AMAZON_HC_URL}" target="_blank" class="review-btn" style="margin-top:6px">📘 Review Hardcover on Amazon</a>
      `;
    }
    reviewHtml = `
      <div class="review-box">
        <div class="review-box-header">🔒 Notice: For Parents &amp; Educators</div>
        <div class="review-box-q">How did you like this complete resource bundle?</div>
        <p>Thank you for choosing Agarutan Print! We hope this combination of printable worksheets, the digital fillable PDF, and the interactive quiz bonus is helping to build your student's skills.</p>
        <p>If this comprehensive resource bundle added value to your student's learning experience, please take a brief moment to share your feedback. Your review helps us continue creating high-quality learning assets!</p>
        ${btnHtml}
      </div>
    `;
  }

  if (passed) {
    app.innerHTML = `
      <div class="end-screen">
        <div class="trophy">🏆</div>
        <div class="stars-row" id="starsRow">
          <span class="star" id="st0">⭐</span>
          <span class="star" id="st1">⭐</span>
          <span class="star" id="st2">⭐</span>
          <span class="star" id="st3">⭐</span>
          <span class="star" id="st4">⭐</span>
        </div>
        <div class="end-title">${titleText}</div>
        <div class="end-subtitle">${subtitleText}</div>
        <div class="pills">
          <div class="pill">${state.points}<span>Points</span></div>
          <div class="pill">✅ ${state.correct}<span>Correct</span></div>
          <div class="pill">❌ ${state.wrong}<span>Wrong</span></div>
          <div class="pill">${pct}%<span>Score</span></div>
        </div>
        <div class="end-btn-row">
          <button class="btn-retry" onclick="startSection(${state.sectionIdx})">🔄 Try Again</button>
          <button class="btn-menu-end" onclick="goMenu()">🏠 Menu</button>
        </div>
        ${reviewHtml}
      </div>
    `;
    // Animate stars
    [0,1,2,3,4].forEach((i) => {
      setTimeout(() => {
        const el = document.getElementById('st'+i);
        if (el) el.classList.add('pop');
      }, 150 + i * 180);
    });
  } else {
    app.innerHTML = `
      <div class="end-screen">
        <div class="encourage-icon">💪</div>
        <div class="end-title">Keep Going!</div>
        <div class="end-subtitle">${subtitleText}<br>You can do it — try again!</div>
        <div class="pills">
          <div class="pill">${state.points}<span>Points</span></div>
          <div class="pill">✅ ${state.correct}<span>Correct</span></div>
          <div class="pill">❌ ${state.wrong}<span>Wrong</span></div>
          <div class="pill">${pct}%<span>Score</span></div>
        </div>
        <div class="end-btn-row">
          <button class="btn-retry" onclick="startSection(${state.sectionIdx})">🔄 Try Again</button>
          <button class="btn-menu-end" onclick="goMenu()">🏠 Menu</button>
        </div>
      </div>
    `;
  }
}

// ── Actions ──────────────────────────────────────────────────────
window.startSection = function(idx) {
  state.sectionIdx = idx;
  state.questions = prepareQuestions(SECTIONS[idx]);
  state.qIdx = 0;
  state.answered = false;
  state.hintUsed = false;
  state.points = 0;
  state.correct = 0;
  state.wrong = 0;
  state.screen = 'quiz';
  render();
};

window.showHint = function() {
  if (state.hintUsed || state.answered) return;
  state.hintUsed = true;
  const hintBox = document.getElementById('hintBox');
  const hintBtn = document.getElementById('hintBtn');
  if (hintBox) hintBox.style.display = 'block';
  if (hintBtn) hintBtn.disabled = true;
};

window.selectOption = function(btn, selected, correct) {
  if (state.answered) return;
  state.answered = true;
  const feedback = document.getElementById('feedback');
  const nextBtn = document.getElementById('nextBtn');
  const allBtns = document.querySelectorAll('.option-btn');

  allBtns.forEach(b => {
    b.disabled = true;
    const bText = b.textContent.trim();
    if (bText === correct) b.classList.add('correct');
  });

  if (selected === correct) {
    btn.classList.add('correct');
    const pts = state.hintUsed ? 5 : 10;
    state.points += pts;
    state.correct++;
    feedback.textContent = state.hintUsed ? `✅ Correct! (+5 pts — hint used)` : `✅ Correct! (+10 pts)`;
    feedback.className = 'feedback correct-fb';
  } else {
    btn.classList.add('wrong');
    state.wrong++;
    feedback.textContent = `❌ Not quite! The answer is: "${correct}"`;
    feedback.className = 'feedback wrong-fb';
  }

  if (nextBtn) nextBtn.disabled = false;
};

window.nextQuestion = function() {
  state.qIdx++;
  state.answered = false;
  state.hintUsed = false;
  if (state.qIdx >= state.questions.length) {
    state.screen = 'end';
  }
  render();
};

window.exitToMenu = function() {
  goMenu();
};

window.goMenu = function() {
  state.screen = 'menu';
  render();
};

// ── Boot ─────────────────────────────────────────────────────────
render();

})();
</script>
